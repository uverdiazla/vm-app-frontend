<mat-toolbar color="primary" class="navbar">
  <div class="container">
    <a mat-button routerLink="/" class="brand">
      <span class="app-title">VM Manager</span>
    </a>
    
    <span class="spacer"></span>
    
    <ng-container *ngIf="isLoggedIn()">
      <!-- Navigation Links -->
      <div class="nav-links">
        <a mat-button routerLink="/virtual-machines" routerLinkActive="active">
          <mat-icon>computer</mat-icon>
          {{ translateKey('nav.virtualMachines') }}
        </a>
      </div>
      
      <!-- User Menu -->
      <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-button">
        <mat-icon>account_circle</mat-icon>
        <span class="username">{{ userName }}</span>
        <mat-icon>arrow_drop_down</mat-icon>
      </button>
      
      <mat-menu #userMenu="matMenu" xPosition="before">
        <div class="menu-header">
          <div class="user-info">
            <span class="user-name">{{ userName }}</span>
            <span class="user-role">{{ userRole }}</span>
          </div>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>{{ translateKey('nav.logout') }}</span>
        </button>
      </mat-menu>
    </ng-container>
  </div>
</mat-toolbar>
