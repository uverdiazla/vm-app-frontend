<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>{{ translate('app.title') }}</h1>
      <p>{{ translate('app.tagline') }}</p>
    </div>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>{{ translate('auth.email') }}</mat-label>
        <input 
          matInput 
          type="email" 
          formControlName="email" 
          autocomplete="email"
          required>
        <mat-icon matPrefix>email</mat-icon>
        <mat-error *ngIf="email?.errors?.['required']">
          {{ translate('auth.requiredField') }}
        </mat-error>
        <mat-error *ngIf="email?.errors?.['email']">
          {{ translate('auth.invalidEmail') }}
        </mat-error>
      </mat-form-field>
      
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>{{ translate('auth.password') }}</mat-label>
        <input 
          matInput 
          [type]="hidePassword ? 'password' : 'text'" 
          formControlName="password"
          autocomplete="current-password"
          required>
        <mat-icon matPrefix>lock</mat-icon>
        <button 
          mat-icon-button 
          matSuffix 
          type="button"
          (click)="hidePassword = !hidePassword" 
          [attr.aria-label]="'Toggle password visibility'" 
          [attr.aria-pressed]="hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="password?.errors?.['required']">
          {{ translate('auth.requiredField') }}
        </mat-error>
        <mat-error *ngIf="password?.errors?.['minlength']">
          {{ translate('auth.passwordMinLength') }}
        </mat-error>
      </mat-form-field>
      
      <div class="login-actions">
        <button 
          mat-raised-button 
          color="primary" 
          type="submit" 
          [disabled]="loginForm.invalid || isLoading"
          class="login-button">
          <mat-icon *ngIf="isLoading">
            <mat-spinner diameter="20"></mat-spinner>
          </mat-icon>
          <span *ngIf="!isLoading">{{ translate('auth.login') }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
